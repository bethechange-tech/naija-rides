openapi: 3.0.3
info:
  title: NR Lagos API
  version: 1.0.0
  description: |
    OTP login flow:
    1. `POST /auth/otp/request` with a phone number to request an OTP.
    2. `POST /auth/otp/verify` with phone and code to receive a bearer token.
    3. Send `Authorization: Bearer <token>` for all protected routes.

    Public routes:
    - `/health`
    - `/auth/otp/request`
    - `/auth/otp/verify`

    All other API routes are protected.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Public system health endpoint
  - name: Auth
    description: OTP login endpoints and authenticated profile update
  - name: Rides
    description: Protected ride discovery, booking, and management endpoints

paths:
  /health:
    $ref: "./paths/health.yaml"

  /auth/otp/request:
    $ref: "./paths/auth.yaml#/otpRequest"

  /auth/otp/verify:
    $ref: "./paths/auth.yaml#/otpVerify"

  /me:
    $ref: "./paths/auth.yaml#/updateMe"

  /rides/search:
    $ref: "./paths/rides.yaml#/searchRides"

  /rides/today:
    $ref: "./paths/rides.yaml#/todayRide"

  /rides/{rideId}/respond:
    $ref: "./paths/rides.yaml#/respondToRide"

  /rides/{rideId}/join:
    $ref: "./paths/rides.yaml#/joinRide"

  /rides:
    $ref: "./paths/rides.yaml#/createRide"

  /me/rides/rider:
    $ref: "./paths/rides.yaml#/myRiderRides"

  /me/rides/driver:
    $ref: "./paths/rides.yaml#/myDriverRides"

  /rides/{rideId}:
    $ref: "./paths/rides.yaml#/cancelRide"

  /me/rides/rider/{bookingId}:
    $ref: "./paths/rides.yaml#/cancelBooking"
