      "404":
        description: Booking not found
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"
      "401":
        description: Missing or invalid bearer token
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"
