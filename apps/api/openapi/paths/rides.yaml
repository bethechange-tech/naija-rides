cancelRide:
  delete:
    operationId: cancelRide
    summary: Driver cancels a ride and all its bookings
    description: Protected endpoint. Requires a Bearer token in the Authorization header.
    tags: [Rides]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: rideId
        required: true
        schema:
          type: string
    responses:
      "204":
        description: Ride cancelled
      "403":
        description: Not the driver
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"
      "404":
        description: Ride not found
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"
      "401":
        description: Missing or invalid bearer token
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"

