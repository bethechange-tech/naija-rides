searchRides:
  get:
    operationId: searchRides
    summary: Find rides between two locations
    description: Protected endpoint. Requires a Bearer token in the Authorization header. Partial, case-insensitive matches on `from` and `to` are supported (e.g. `yab` matches `Yaba`).
    tags: [Rides]
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: from
        required: true
        schema:
          type: string
      - in: query
        name: to
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Matching rides
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/rides.yaml#/Ride"
      "401":
        description: Missing or invalid bearer token
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"

todayRide:
  get:
    operationId: getTodayRide
    summary: Get the signed-in user's ride for today
    description: Protected endpoint. Requires a Bearer token in the Authorization header.
    tags: [Rides]
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Ride for today or null
        content:
          application/json:
            schema:
              type: object
              allOf:
                - $ref: "../schemas/rides.yaml#/Ride"
              nullable: true
      "401":
        description: Missing or invalid bearer token
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"

respondToRide:
  post:
    operationId: respondToRide
    summary: Record riding or skipping for today
    description: Protected endpoint. Requires a Bearer token in the Authorization header.
    tags: [Rides]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: rideId
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/rides.yaml#/RideRespondRequest"
    responses:
      "200":
        description: Response recorded
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideRespondResponse"
      "204":
        description: Response recorded (no body)
      "401":
        description: Missing or invalid bearer token
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"

joinRide:
  post:
    operationId: joinRide
    summary: Join a ride as a passenger
    description: Protected endpoint. Requires a Bearer token in the Authorization header.
    tags: [Rides]
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: rideId
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/rides.yaml#/JoinRideRequest"
    responses:
      "200":
        description: Joined ride
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/Ride"
      "204":
        description: Joined ride (no body)
      "409":
        description: Ride full or already joined
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"
      "401":
        description: Missing or invalid bearer token
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"

createRide:
  post:
    operationId: createRide
    summary: Create a new ride
    description: Protected endpoint. Requires a Bearer token in the Authorization header.
    tags: [Rides]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/rides.yaml#/CreateRideRequest"
    responses:
      "201":
        description: Ride created
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/Ride"
      "401":
        description: Missing or invalid bearer token
        content:
          application/json:
            schema:
              $ref: "../schemas/rides.yaml#/RideError"

